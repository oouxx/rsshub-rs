name: Build & Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*" # 推送 v1.0.0 这样的 tag 时也触发
  pull_request:
    branches:
      - main # PR 时只构建不推送，用于验证能否编译

env:
  REGISTRY: ghcr.io
  # github.repository = "你的用户名/rss-forge"
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # 需要写入 packages 的权限（推送镜像到 GHCR）
    permissions:
      contents: read
      packages: write

    steps:
      # 1. 拉取代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 设置 Docker Buildx（支持多平台构建、缓存等）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. 登录 GitHub Container Registry
      #    GITHUB_TOKEN 是自动注入的，不需要手动配置 Secret
      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. 提取镜像标签和 label 元数据
      #    自动生成：latest、v1.0.0、sha-abc1234 等多个 tag
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # main 分支 → latest
            type=raw,value=latest,enable={{is_default_branch}}
            # git tag → v1.0.0
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # commit sha → sha-abc1234（方便回滚）
            type=sha,prefix=sha-

      # 5. 构建并推送
      #    --cache-from/to 利用 GitHub Actions Cache 加速 Rust 编译
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64 # 同时构建 x86 和 ARM
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 6. 输出镜像摘要（方便查看）
      - name: Image digest
        run: echo ${{ steps.build-and-push.outputs.digest }}
