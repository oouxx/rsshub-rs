<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>rsshub-rs</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                background: #0d1117;
                color: #e6edf3;
                min-height: 100vh;
            }
            header {
                background: linear-gradient(135deg, #161b22, #1f2937);
                border-bottom: 1px solid #30363d;
                padding: 2rem;
                text-align: center;
            }
            header h1 {
                font-size: 2.5rem;
                background: linear-gradient(90deg, #f97316, #fb923c);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }
            header p {
                color: #8b949e;
                margin-top: 0.5rem;
            }
            main {
                max-width: 900px;
                margin: 0 auto;
                padding: 2rem;
            }
            .section {
                margin-bottom: 2.5rem;
            }
            .section h2 {
                font-size: 1.2rem;
                color: #f97316;
                border-left: 3px solid #f97316;
                padding-left: 0.75rem;
                margin-bottom: 1rem;
            }
            .routes {
                display: grid;
                gap: 0.5rem;
            }
            .route {
                background: #161b22;
                border: 1px solid #30363d;
                border-radius: 8px;
                padding: 0.75rem 1rem;
                display: flex;
                align-items: center;
                gap: 1rem;
                transition: border-color 0.2s;
            }
            .route:hover {
                border-color: #f97316;
            }
            .route a {
                color: #58a6ff;
                text-decoration: none;
                font-family: monospace;
                font-size: 0.95rem;
                flex: 1;
            }
            .route a:hover {
                text-decoration: underline;
            }
            .route .desc {
                color: #8b949e;
                font-size: 0.85rem;
            }
            .badge {
                background: #1f2937;
                border: 1px solid #374151;
                border-radius: 4px;
                padding: 0.2rem 0.5rem;
                font-size: 0.75rem;
                color: #9ca3af;
            }
            .scrape-tool {
                background: #161b22;
                border: 1px solid #30363d;
                border-radius: 8px;
                padding: 1.5rem;
            }
            .form-group {
                margin-bottom: 1rem;
            }
            label {
                display: block;
                font-size: 0.85rem;
                color: #8b949e;
                margin-bottom: 0.35rem;
            }
            input {
                width: 100%;
                background: #0d1117;
                border: 1px solid #30363d;
                border-radius: 6px;
                padding: 0.5rem 0.75rem;
                color: #e6edf3;
                font-family: monospace;
                font-size: 0.9rem;
                outline: none;
            }
            input:focus {
                border-color: #f97316;
            }
            .form-row {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 1rem;
            }
            button {
                background: #f97316;
                color: white;
                border: none;
                border-radius: 6px;
                padding: 0.6rem 1.5rem;
                cursor: pointer;
                font-size: 0.9rem;
                font-weight: 600;
                transition: background 0.2s;
            }
            button:hover {
                background: #ea6c08;
            }
            #result {
                margin-top: 1rem;
                background: #0d1117;
                border: 1px solid #30363d;
                border-radius: 6px;
                padding: 1rem;
                font-family: monospace;
                font-size: 0.85rem;
                color: #58a6ff;
                word-break: break-all;
                display: none;
            }
            footer {
                text-align: center;
                padding: 2rem;
                color: #8b949e;
                font-size: 0.85rem;
                border-top: 1px solid #30363d;
            }
        </style>
    </head>
    <body>
        <header>
            <h1>📡 rsshub-rs</h1>
            <p>用 Rust 构建的 RSSHub 替代品 · 为任何网站定制 RSS 订阅</p>
        </header>
        <main>
            <div class="section">
                <h2>📌 已注册路由</h2>
                <div class="routes">
                    {% for r in routes %}
                    <div class="route">
                        <span class="badge">{{ r.group }}</span>
                        <a href="{{ r.path }}" target="_blank">{{ r.path }}</a>
                        <span class="desc">{{ r.description }}</span>
                    </div>
                    {% endfor %}
                </div>
            </div>

            <div class="section">
                <h2>🕷️ 通用网页抓取</h2>
                <div class="scrape-tool">
                    <p
                        style="
                            color: #8b949e;
                            font-size: 0.85rem;
                            margin-bottom: 1rem;
                        "
                    >
                        通过 CSS Selector 从任意页面生成 RSS，无需写代码
                    </p>
                    <div class="form-group">
                        <label>目标页面 URL *</label>
                        <input
                            id="s-url"
                            type="text"
                            placeholder="https://example.com/news"
                        />
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>文章容器 Selector *</label>
                            <input
                                id="s-item"
                                type="text"
                                placeholder="article, .post-item"
                            />
                        </div>
                        <div class="form-group">
                            <label>标题 Selector *</label>
                            <input
                                id="s-title"
                                type="text"
                                placeholder="h2 a, .title"
                            />
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>描述 Selector</label>
                            <input
                                id="s-desc"
                                type="text"
                                placeholder=".summary, p"
                            />
                        </div>
                        <div class="form-group">
                            <label>作者 Selector</label>
                            <input
                                id="s-author"
                                type="text"
                                placeholder=".author"
                            />
                        </div>
                    </div>
                    <button onclick="buildScrapeUrl()">生成 RSS 地址</button>
                    <div id="result"></div>
                </div>
            </div>
        </main>
        <footer>rsshub-rs · Built with Rust 🦀 · axum + scraper + rss</footer>
        <script>
            function buildScrapeUrl() {
                const url = document.getElementById("s-url").value.trim();
                const item = document.getElementById("s-item").value.trim();
                const title = document.getElementById("s-title").value.trim();
                const desc = document.getElementById("s-desc").value.trim();
                const author = document.getElementById("s-author").value.trim();
                if (!url || !item || !title) {
                    alert("请填写必填字段");
                    return;
                }
                const params = new URLSearchParams({ url, item, title });
                if (desc) params.set("desc", desc);
                if (author) params.set("author", author);
                const rssUrl = `/scrape?${params.toString()}`;
                const el = document.getElementById("result");
                el.style.display = "block";
                el.innerHTML = `RSS 地址：<a href="${rssUrl}" target="_blank">${location.origin}${rssUrl}</a>`;
            }
        </script>
    </body>
</html>
