services:
  rsshub-rs:
    # 本地开发用 build，生产环境注释掉 build 改用 image
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/oouxx/rsshub-rs:latest # 生产环境取消注释
    container_name: rsshub-rs
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - RUST_LOG=${RUST_LOG:-rsshub_rs=info,tower_http=info}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
